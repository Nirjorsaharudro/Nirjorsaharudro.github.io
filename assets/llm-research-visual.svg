<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="820" viewBox="0 0 1280 820" role="img" aria-labelledby="title desc">
  <title id="title">LLM retrieval research visual</title>
  <desc id="desc">A professional diagram showing bilingual retrieval, hybrid search, ranking, and answer generation.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="1" stop-color="#edf4ed"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#17202a" flood-opacity="0.14"/>
    </filter>
  </defs>
  <rect width="1280" height="820" rx="34" fill="url(#bg)"/>
  <g opacity="0.54" stroke="#d7e2da" stroke-width="2">
    <path d="M0 120h1280M0 240h1280M0 360h1280M0 480h1280M0 600h1280M0 720h1280"/>
    <path d="M120 0v820M240 0v820M360 0v820M480 0v820M600 0v820M720 0v820M840 0v820M960 0v820M1080 0v820M1200 0v820"/>
  </g>
  <g filter="url(#softShadow)">
    <rect x="96" y="82" width="1088" height="648" rx="28" fill="#ffffff" stroke="#c8d5cc" stroke-width="2"/>
  </g>
  <g transform="translate(150 142)">
    <text x="0" y="0" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="900" fill="#17202a">Multilingual Retrieval-Augmented Generation</text>
    <text x="0" y="34" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#637381">Bangla and English knowledge flow from documents to grounded responses</text>
  </g>
  <g transform="translate(150 236)">
    <rect width="240" height="340" rx="22" fill="#f6f8f6" stroke="#dbe3dc"/>
    <text x="26" y="50" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="900" fill="#17202a">Source documents</text>
    <g font-family="Inter, Arial, sans-serif" font-size="15" font-weight="800" fill="#637381">
      <rect x="26" y="78" width="188" height="42" rx="10" fill="#ffffff" stroke="#dbe3dc"/>
      <text x="42" y="105">বাংলা passage</text>
      <rect x="26" y="136" width="188" height="42" rx="10" fill="#ffffff" stroke="#dbe3dc"/>
      <text x="42" y="163">English passage</text>
      <rect x="26" y="194" width="188" height="42" rx="10" fill="#ffffff" stroke="#dbe3dc"/>
      <text x="42" y="221">Chunk metadata</text>
      <rect x="26" y="252" width="188" height="42" rx="10" fill="#ffffff" stroke="#dbe3dc"/>
      <text x="42" y="279">Evaluation set</text>
    </g>
  </g>
  <g transform="translate(470 226)">
    <rect width="342" height="360" rx="24" fill="#17202a"/>
    <text x="28" y="52" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="900" fill="#ffffff">Hybrid retrieval core</text>
    <g transform="translate(28 92)">
      <rect width="286" height="72" rx="16" fill="#243340"/>
      <circle cx="38" cy="36" r="13" fill="#1f5f8b"/>
      <text x="68" y="32" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="900" fill="#ffffff">Dense search</text>
      <text x="68" y="54" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" fill="#a8bac5">FAISS semantic matches</text>
    </g>
    <g transform="translate(28 184)">
      <rect width="286" height="72" rx="16" fill="#243340"/>
      <circle cx="38" cy="36" r="13" fill="#c87524"/>
      <text x="68" y="32" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="900" fill="#ffffff">Lexical search</text>
      <text x="68" y="54" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" fill="#a8bac5">BM25 keyword grounding</text>
    </g>
    <g transform="translate(28 278)">
      <rect width="286" height="40" rx="20" fill="#2f7d5a"/>
      <text x="82" y="26" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="900" fill="#ffffff">Rank, merge, cite context</text>
    </g>
  </g>
  <g transform="translate(892 236)">
    <rect width="240" height="340" rx="22" fill="#f6f8f6" stroke="#dbe3dc"/>
    <text x="26" y="50" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="900" fill="#17202a">Answer layer</text>
    <rect x="26" y="82" width="188" height="190" rx="18" fill="#ffffff" stroke="#dbe3dc"/>
    <text x="48" y="122" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="900" fill="#1f5f8b">Question</text>
    <text x="48" y="152" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800" fill="#637381">What is the answer?</text>
    <path d="M48 180h142M48 208h116M48 236h134" stroke="#dbe3dc" stroke-width="10" stroke-linecap="round"/>
    <rect x="26" y="292" width="188" height="34" rx="17" fill="#17202a"/>
    <text x="68" y="314" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="900" fill="#ffffff">Grounded response</text>
  </g>
  <g fill="none" stroke="#bdc9c0" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
    <path d="M400 406h54"/>
    <path d="M812 406h64"/>
  </g>
  <g fill="#bdc9c0">
    <path d="M454 406l-14-9v18z"/>
    <path d="M876 406l-14-9v18z"/>
  </g>
  <g transform="translate(170 632)">
    <rect width="170" height="44" rx="22" fill="#eaf2ff" stroke="#cfe2f3"/>
    <text x="32" y="28" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="900" fill="#1f5f8b">Bangla-English</text>
    <rect x="190" width="142" height="44" rx="22" fill="#edf7f1" stroke="#cce6d8"/>
    <text x="232" y="28" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="900" fill="#2f7d5a">RAG</text>
    <rect x="352" width="166" height="44" rx="22" fill="#fff3e5" stroke="#efd4b6"/>
    <text x="390" y="28" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="900" fill="#c87524">Hybrid search</text>
    <rect x="538" width="132" height="44" rx="22" fill="#f8ecea" stroke="#edcec9"/>
    <text x="574" y="28" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="900" fill="#b54a3a">FastAPI</text>
  </g>
</svg>
